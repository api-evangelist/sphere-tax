meters:
- name: active_regions
  description: Active tax regions billed at a flat fee per region per month.
  unit: regions
  aggregation: sum
  dimensions:
  - account
  - region
- name: transactions
  description: Transactions processed; a flat per-transaction fee applies above 50,000 across active regions.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - region
- name: registration_fees
  description: Pass-through jurisdiction registration fees debited to the account.
  unit: registrations
  aggregation: sum
  dimensions:
  - account
  - jurisdiction
principles:
- name: Visibility
  description: Track active regions and transaction volume per region; watch the 50,000-transaction overage threshold.
- name: Allocation
  description: Map regions and transaction volume to internal cost centers and entities.
- name: Optimization
  description: Consolidate regions where compliance allows; avoid registering in regions without nexus exposure; monitor exposure before registering.
- name: Accountability
  description: Assign owners for each region and review monthly region count, transaction overage, and registration fees against budget.
