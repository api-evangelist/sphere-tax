description: >-
  FinOps view of Sphere spend. Sphere bills a flat fee per active region per
  month (Starter), custom sales-led pricing for ten or more regions (Growth), a
  flat per-transaction overage above 50,000 transactions across active regions,
  and pass-through jurisdiction registration fees debited to the account. There
  are no implementation or one-off fees. Pricing is partly sales-led so exact
  amounts are not fully public; this artifact is not reconciled.
notes: >-
  Custom Growth pricing and the per-transaction overage amount are not public.
  Verify against the Sphere pricing page and your agreement during reconciliation.
