  baseURL: https://server.getsphere.com
  properties:
  - url: https://docs.getsphere.com/features/integrations
    type: Documentation
  - url: openapi/sphere-tax-openapi.yml
    type: OpenAPI
  description: Sphere markets RESTful APIs and webhooks for integration with billing
    systems and ERPs. A specific webhook event catalog and subscription endpoints
    are not detailed in the public API reference as of this writing; webhook delivery
    is configured via integrations and prebuilt connectors.
