aid: sphere-tax
url: https://raw.githubusercontent.com/api-evangelist/sphere-tax/refs/heads/main/apis.yml
name: Sphere
kind: company
description: Sphere is a developer-first global indirect tax compliance platform that
  automates sales tax, VAT, and GST across nexus monitoring, registration, real-time
  calculation, and filing/remittance. Its REST API lets billing and checkout flows
  call the Sphere tax engine to calculate tax on transactions and export transaction
  data, authenticated with an X-API-KEY header.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Tax
- Sales Tax
- VAT
- GST
- Compliance
- FinTech
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
apis:
- aid: sphere-tax:sphere-tax-calculations-api
  name: Sphere Tax Calculations API
  tags:
  - Tax
  - Calculation
  - Sales Tax
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.getsphere.com/features/integrations/api/tax-calculation
  baseURL: https://server.getsphere.com
  properties:
  - url: https://docs.getsphere.com/features/integrations/api/tax-calculation
    type: Documentation
  - url: https://docs.getsphere.com/features/integrations/api
    type: APIReference
  - url: openapi/sphere-tax-openapi.yml
    type: OpenAPI
  - url: collections/sphere-tax.postman_collection.json
    type: PostmanCollection
  - url: collections/sphere-tax.opencollection.json
    type: OpenCollection
  description: Real-time indirect tax calculation for billing and checkout flows. POST
    line items, a customer address, and a currency to /tax_api/calculate_tax and receive
    per-line tax amounts, taxable amounts, and rate breakdown (jurisdiction, country,
    state, tax type).
- aid: sphere-tax:sphere-transactions-export-api
  name: Sphere Transactions Export API
  tags:
  - Transactions
  - Export
  - Reporting
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.getsphere.com/features/reports/transaction-export
  baseURL: https://server.getsphere.com
  properties:
  - url: https://docs.getsphere.com/features/reports/transaction-export
    type: Documentation
  - url: https://docs.getsphere.com/features/integrations/api
    type: APIReference
  - url: openapi/sphere-tax-openapi.yml
    type: OpenAPI
  - url: collections/sphere-tax.postman_collection.json
    type: PostmanCollection
  - url: collections/sphere-tax.opencollection.json
    type: OpenCollection
  description: Asynchronous export of transaction data for reporting and reconciliation.
    Create an export job, poll its status, retrieve the download, or cancel a running
    job via the /tax_api/exports endpoints.
- aid: sphere-tax:sphere-registrations-filings-api
  name: Sphere Registrations and Filings API
  tags:
  - Registration
  - Filing
  - Remittance
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.getsphere.com/features/registration
  baseURL: https://server.getsphere.com
  properties:
  - url: https://docs.getsphere.com/features/registration
    type: Documentation
  - url: https://docs.getsphere.com/features/filing-and-remittance
    type: Documentation
  - url: openapi/sphere-tax-openapi.yml
    type: OpenAPI
  description: Registration in tax jurisdictions globally and automated filing and
    remittance are delivered as Sphere platform features. No dedicated public REST
    endpoints for registration or filing are documented in the public API reference
    as of this writing; these are managed through the Sphere app and prebuilt connectors.
- aid: sphere-tax:sphere-nexus-monitoring-api
  name: Sphere Nexus Monitoring API
  tags:
  - Nexus
  - Monitoring
