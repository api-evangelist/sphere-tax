  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.getsphere.com/features/monitoring
  baseURL: https://server.getsphere.com
  properties:
  - url: https://docs.getsphere.com/features/monitoring
    type: Documentation
  - url: openapi/sphere-tax-openapi.yml
    type: OpenAPI
  description: Monitoring tracks global tax exposure and nexus thresholds so teams
    can plan for compliance. Surfaced as a Sphere platform feature; no dedicated public
    REST endpoint for nexus monitoring is documented in the public API reference.
- aid: sphere-tax:sphere-exemptions-api
  name: Sphere Exemptions API
  tags:
  - Exemptions
