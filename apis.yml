  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.getsphere.com/features/calculation
  baseURL: https://server.getsphere.com
  properties:
  - url: https://docs.getsphere.com/features/calculation
    type: Documentation
  - url: openapi/sphere-tax-openapi.yml
    type: OpenAPI
  description: Exemption handling is applied within Sphere's calculation engine. No
    dedicated public REST endpoint for managing exemptions or exemption certificates
    is documented in the public API reference; exemption behavior is reflected in
    calculate_tax results.
- aid: sphere-tax:sphere-webhooks-api
